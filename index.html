<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poseidon Operations</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">

    <script>
        if (typeof process !== 'undefined' && process.env.NODE_ENV === 'development') {
            window.addEventListener('DOMContentLoaded', () => {
                require('electron').webFrame.openDevTools();
            });
        }
    </script>

    <style>
        .order { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
        .hidden { display: none; }
        .chart-container { height: 600px; margin-top: 20px; }
        body { -webkit-user-select: none; user-select: none; }
        .tab-content { padding-top: 20px; }
    </style>
</head>
<body class="container mt-4">
    <h1 class="mb-4">Poseidon Operations System</h1>

    <ul class="nav nav-tabs" id="mainTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-fx" type="button">FX Order</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-cd" type="button">Call Deposit</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-ftd" type="button">FTD Deposit</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-ool" type="button">One-off Loan</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-si" type="button">SI Loan</button>
        </li>
    </ul>

    <div class="tab-content">
        <!-- FX Order tab -->
        <div class="tab-pane fade show active" id="tab-fx" role="tabpanel">
            <div id="formContainer">
                <div id="fxAccountPicker"></div>
                <div id="fxRoutingDisplay" class="alert alert-secondary mb-3" style="display:none;"></div>

                <div id="orders"></div>

                <button id="addOrder" class="btn btn-secondary mb-3">Add Another Order</button>
                <button id="openOutlook" class="btn btn-primary btn-lg px-4" disabled>Generate Email</button>
            </div>
        </div>

        <!-- Call Deposit tab -->
        <div class="tab-pane fade" id="tab-cd" role="tabpanel">
            <div class="mb-3">
                <label class="form-label d-block">Action</label>
                <div class="btn-group btn-group-lg" role="group" aria-label="Call Deposit action">
                    <input type="radio" class="btn-check" name="cdAction" id="cdActionPlace" value="place" checked>
                    <label class="btn btn-outline-primary" for="cdActionPlace" style="min-width: 8rem;">Place</label>
                    <input type="radio" class="btn-check" name="cdAction" id="cdActionUnwind" value="unwind">
                    <label class="btn btn-outline-primary" for="cdActionUnwind" style="min-width: 8rem;">Unwind</label>
                </div>
            </div>

            <div id="cdAccountPicker"></div>

            <div class="row">
                <div class="mb-3 col-md-2">
                    <label for="cdCcy" class="form-label">Currency</label>
                    <select id="cdCcy" class="form-select"></select>
                </div>
                <div class="mb-3 col-md-4">
                    <label for="cdAmount" class="form-label">Amount</label>
                    <input type="text" id="cdAmount" class="form-control" placeholder="e.g., 500,000">
                </div>
                <div class="mb-3 col-md-3">
                    <label for="cdValueDate" class="form-label">Value</label>
                    <input type="text" id="cdValueDate" class="form-control" placeholder="Today">
                </div>
            </div>

            <button id="cdGenerate" class="btn btn-primary btn-lg px-4" disabled>Generate Email</button>
        </div>

        <!-- FTD Deposit tab -->
        <div class="tab-pane fade" id="tab-ftd" role="tabpanel">
            <div id="ftdAccountPicker"></div>
            <div class="row">
                <div class="mb-3 col-md-2">
                    <label for="ftdCcy" class="form-label">Currency</label>
                    <select id="ftdCcy" class="form-select"></select>
                </div>
                <div class="mb-3 col-md-4">
                    <label for="ftdAmount" class="form-label">Amount</label>
                    <input type="text" id="ftdAmount" class="form-control" placeholder="e.g., 6,680,810.38">
                </div>
                <div class="mb-3 col-md-3">
                    <label for="ftdTenor" class="form-label">Tenor</label>
                    <select id="ftdTenor" class="form-select"></select>
                </div>
                <div class="mb-3 col-md-3">
                    <label for="ftdRate" class="form-label">Rate (optional)</label>
                    <div class="input-group">
                        <input type="text" id="ftdRate" class="form-control" placeholder="e.g., 3.586" inputmode="decimal">
                        <span class="input-group-text">%</span>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="mb-3 col-md-3">
                    <label for="ftdValueDate" class="form-label">Value</label>
                    <input type="text" id="ftdValueDate" class="form-control" placeholder="Today">
                </div>
            </div>
            <button id="ftdGenerate" class="btn btn-primary btn-lg px-4" disabled>Generate Email</button>
        </div>

        <!-- One-off Loan tab -->
        <div class="tab-pane fade" id="tab-ool" role="tabpanel">
            <div id="oolAccountPicker"></div>
            <div class="row">
                <div class="mb-3 col-md-2">
                    <label for="oolCcy" class="form-label">Currency</label>
                    <select id="oolCcy" class="form-select"></select>
                </div>
                <div class="mb-3 col-md-4">
                    <label for="oolAmount" class="form-label">Amount</label>
                    <input type="text" id="oolAmount" class="form-control" placeholder="e.g., 384,415.96">
                </div>
                <div class="mb-3 col-md-3">
                    <label for="oolStartDate" class="form-label">Start Date</label>
                    <input type="text" id="oolStartDate" class="form-control" placeholder="Today">
                </div>
                <div class="mb-3 col-md-3">
                    <label for="oolEndDate" class="form-label">End Date (til)</label>
                    <input type="text" id="oolEndDate" class="form-control" placeholder="Select end date">
                </div>
            </div>
            <div class="mb-3">
                <label for="oolPurpose" class="form-label">Purpose</label>
                <input type="text" id="oolPurpose" class="form-control" value="to cover OD">
            </div>
            <button id="oolGenerate" class="btn btn-primary btn-lg px-4" disabled>Generate Email</button>
        </div>

        <!-- SI Loan tab -->
        <div class="tab-pane fade" id="tab-si" role="tabpanel">
            <div id="siAccountPicker"></div>
            <div class="row">
                <div class="mb-3 col-md-2">
                    <label for="siCcy" class="form-label">Currency</label>
                    <select id="siCcy" class="form-select"></select>
                </div>
                <div class="mb-3 col-md-4">
                    <label for="siAmount" class="form-label">Amount</label>
                    <input type="text" id="siAmount" class="form-control" placeholder="e.g., 398,376,250">
                </div>
                <div class="mb-3 col-md-3">
                    <label for="siStartDate" class="form-label">Start Date</label>
                    <input type="text" id="siStartDate" class="form-control" placeholder="Today">
                </div>
                <div class="mb-3 col-md-3">
                    <label for="siRolling" class="form-label">Rolling</label>
                    <select id="siRolling" class="form-select">
                        <option value="weekly">weekly</option>
                        <option value="monthly" selected>monthly</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="mb-3 col-md-6">
                    <label for="siLoanInstruction" class="form-label">Loan Instruction <span class="text-muted small">(auto-filled from account, editable)</span></label>
                    <input type="text" id="siLoanInstruction" class="form-control" placeholder="e.g., P+I+-Bal.">
                </div>
                <div class="mb-3 col-md-6">
                    <label for="siPurpose" class="form-label">Purpose</label>
                    <input type="text" id="siPurpose" class="form-control" value="to cover OD">
                </div>
            </div>
            <button id="siGenerate" class="btn btn-primary btn-lg px-4" disabled>Generate Email</button>
        </div>
    </div>

    <!-- Third-party scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Renderer modules -->
    <script src="renderer/common.js"></script>
    <script src="renderer/counterparty.js"></script>
    <script src="renderer/account-picker.js"></script>
    <script src="renderer/templates.js"></script>

    <!-- App logic -->
    <script>
        // ===== FX Order tab =====
        let fxPicker = null;

        function updateFxRoutingDisplay(account, cp) {
            const el = document.getElementById('fxRoutingDisplay');
            if (!account) { el.style.display = 'none'; return; }
            el.style.display = 'block';
            if (!cp || !cp.resolvedAs || !cp.to || cp.to.length === 0) {
                el.className = 'alert alert-warning mb-3';
                el.textContent = `No FX counterparty configured for ${account.custodian || '?'}/${account.book || '?'} — submit disabled.`;
                document.getElementById('openOutlook').disabled = true;
                return;
            }
            const isDAC = cp.resolvedAs === 'ubs-hksg-fx-dac';
            const label = isDAC
                ? (cp.clientCode ? `UBS FX DAC — Client Code: ${cp.clientCode}` : `UBS FX DAC — Client Code: (TBD; will be omitted from body)`)
                : (cp.resolvedAs === 'ubs-hksg-fx-gfim' ? 'UBS HK/SG GFIM' : `${cp.resolvedAs} (deposit desk)`);
            el.className = 'alert alert-info mb-3';
            el.innerHTML = `Routing to: <strong>${label}</strong> &middot; To: ${cp.to.map(r => r.email).join(', ')}`;
            document.getElementById('openOutlook').disabled = false;
        }

        function addOrder() {
            const ordersDiv = document.getElementById('orders');
            const orderIndex = ordersDiv.children.length + 1;
            const i = orderIndex;
            const ccyOptions = ['USD','EUR','JPY','GBP','CAD','AUD','NZD','CHF','HKD','CNH','KRW','TWD','SGD']
                .map(c => `<option value="${c}">${c}</option>`).join('');

            const orderHtml = `
                <div class="order" id="order${i}">
                    <h3>Order ${i}
                        <span class="float-end">
                            <button class="btn btn-secondary btn-sm me-1" onclick="replicateOrder(${i})">Replicate</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteOrder(${i})">Delete</button>
                        </span>
                    </h3>

                    <div class="mb-3">
                        <label class="form-label d-block">Order Type</label>
                        <div class="btn-group btn-group-lg" role="group">
                            <input type="radio" class="btn-check" name="orderType${i}" id="market${i}" value="market" checked>
                            <label class="btn btn-outline-primary" for="market${i}" style="min-width:8rem;">Market</label>
                            <input type="radio" class="btn-check" name="orderType${i}" id="limit${i}" value="limit">
                            <label class="btn btn-outline-primary" for="limit${i}" style="min-width:8rem;">Limit</label>
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3 col-md-3">
                            <label class="form-label">Buy</label>
                            <select id="buyCurrency${i}" class="form-select">${ccyOptions}</select>
                        </div>
                        <div class="mb-3 col-md-3">
                            <label class="form-label">Sell</label>
                            <select id="sellCurrency${i}" class="form-select">${ccyOptions}</select>
                        </div>
                        <div class="col-md-6 d-flex align-items-end mb-3">
                            <div id="ccyError${i}" class="text-danger small" style="display:none;">Buy and Sell cannot be the same currency.</div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3 col-md-2">
                            <label class="form-label">Notional CCY</label>
                            <select id="notionalCurrency${i}" class="form-select"></select>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Amount</label>
                            <input type="text" id="notionalAmount${i}" class="form-control"
                                   placeholder="e.g., 1,000,000"
                                   oninput="this.value = formatNotional(this.value)">
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3 col-md-3">
                            <label class="form-label">Tenor</label>
                            <select id="marketType${i}" class="form-select">
                                <option value="Today">Today</option>
                                <option value="Tomorrow">Tomorrow</option>
                                <option value="Spot" selected>Spot</option>
                            </select>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label class="form-label">Spread</label>
                            <div class="input-group">
                                <input type="number" id="spread${i}" class="form-control" value="20" min="0">
                                <select id="spreadUnit${i}" class="form-select" style="max-width:6rem;">
                                    <option value="bps" selected>bps</option>
                                    <option value="pips">pips</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="limitFields hidden" id="limitFields${i}">
                        <div class="row">
                            <div class="mb-3 col-md-3">
                                <label class="form-label">Limit Price</label>
                                <input type="text" id="limitPrice${i}" class="form-control" placeholder="e.g., 10.6989">
                            </div>
                            <div class="mb-3 col-md-4">
                                <label class="form-label">Good Till</label>
                                <input type="text" id="goodTill${i}" class="form-control" placeholder="Select date">
                            </div>
                            <div class="mb-3 col-md-3 d-flex align-items-end">
                                <div class="text-muted small">Pair: <strong id="pairLabel${i}">—</strong></div>
                            </div>
                        </div>
                        <div class="chart-container">
                            <canvas id="chart${i}"></canvas>
                            <div id="chartError${i}" class="alert alert-warning" style="display:none;"></div>
                        </div>
                    </div>
                </div>
            `;
            ordersDiv.insertAdjacentHTML('beforeend', orderHtml);

            const buySelect = document.getElementById(`buyCurrency${i}`);
            const sellSelect = document.getElementById(`sellCurrency${i}`);
            const notionalSelect = document.getElementById(`notionalCurrency${i}`);
            const ccyError = document.getElementById(`ccyError${i}`);
            const pairLabel = document.getElementById(`pairLabel${i}`);
            const spreadInput = document.getElementById(`spread${i}`);
            const spreadUnit = document.getElementById(`spreadUnit${i}`);

            // sensible defaults: Buy USD, Sell JPY (avoid same-ccy on first paint)
            sellSelect.value = 'JPY';

            const refresh = () => {
                const buy = buySelect.value;
                const sell = sellSelect.value;
                const same = buy && sell && buy === sell;
                ccyError.style.display = same ? 'block' : 'none';

                // Notional CCY: only Buy + Sell are valid choices
                const allowed = [...new Set([buy, sell])].filter(Boolean);
                notionalSelect.innerHTML = '';
                allowed.forEach(c => notionalSelect.add(new Option(c, c)));

                // Auto-derived pair (Buy + Sell)
                pairLabel.textContent = same || !buy || !sell ? '—' : `${buy}${sell}`;

                // Refresh chart if currently in limit mode and pair is valid
                if (!same && buy && sell) {
                    const limitFields = document.getElementById(`limitFields${i}`);
                    if (!limitFields.classList.contains('hidden')) {
                        fetchPriceData(`${buy}${sell}`, i, 'chart');
                    }
                }
            };
            buySelect.addEventListener('change', refresh);
            sellSelect.addEventListener('change', refresh);
            refresh();

            // Spread default flips with unit (bps→20, pips→10)
            spreadUnit.addEventListener('change', () => {
                spreadInput.value = spreadUnit.value === 'bps' ? '20' : '10';
            });

            // flatpickr for Good Till
            const goodTill = document.querySelector(`#goodTill${i}`);
            const defaultDate = new Date(new Date().setDate(new Date().getDate() + 14));
            flatpickr(goodTill, {
                defaultDate,
                dateFormat: 'd M Y',
                onChange: (_dates, dateStr, instance) => { instance.input.value = dateStr + ' NY 5pm'; },
            });
            goodTill.value = flatpickr.formatDate(defaultDate, 'd M Y') + ' NY 5pm';

            // Toggle Market vs Limit
            document.querySelectorAll(`input[name="orderType${i}"]`).forEach(radio => {
                radio.addEventListener('change', function() {
                    const limitFields = document.getElementById(`limitFields${i}`);
                    limitFields.classList.toggle('hidden', this.value !== 'limit');
                    if (this.value === 'limit') refresh(); // load chart on first switch
                });
            });
        }

        function deleteOrder(index) {
            const orderDiv = document.getElementById(`order${index}`);
            orderDiv.remove();
        }

        function replicateOrder(srcIndex) {
            const src = document.getElementById(`order${srcIndex}`);
            if (!src) return;

            const captured = {
                orderType: src.querySelector(`input[name="orderType${srcIndex}"]:checked`)?.value || 'market',
                buy:        src.querySelector(`#buyCurrency${srcIndex}`)?.value,
                sell:       src.querySelector(`#sellCurrency${srcIndex}`)?.value,
                notionalCcy:src.querySelector(`#notionalCurrency${srcIndex}`)?.value,
                amount:     src.querySelector(`#notionalAmount${srcIndex}`)?.value,
                tenor:      src.querySelector(`#marketType${srcIndex}`)?.value,
                spread:     src.querySelector(`#spread${srcIndex}`)?.value,
                spreadUnit: src.querySelector(`#spreadUnit${srcIndex}`)?.value,
                limitPrice: src.querySelector(`#limitPrice${srcIndex}`)?.value,
                goodTill:   src.querySelector(`#goodTill${srcIndex}`)?.value,
            };

            addOrder();
            const newIndex = document.getElementById('orders').children.length;
            const dst = document.getElementById(`order${newIndex}`);

            // Order type — flip + dispatch change so Limit fields show/hide
            const otRadio = dst.querySelector(`input[name="orderType${newIndex}"][value="${captured.orderType}"]`);
            if (otRadio) { otRadio.checked = true; otRadio.dispatchEvent(new Event('change')); }

            // Buy/Sell — dispatch change so refresh() updates notional options + pair label + chart
            const dstBuy  = dst.querySelector(`#buyCurrency${newIndex}`);
            const dstSell = dst.querySelector(`#sellCurrency${newIndex}`);
            if (captured.buy)  dstBuy.value  = captured.buy;
            if (captured.sell) dstSell.value = captured.sell;
            dstBuy.dispatchEvent(new Event('change'));

            // Notional CCY — restore (refresh just rebuilt the options to [buy, sell])
            const dstNotional = dst.querySelector(`#notionalCurrency${newIndex}`);
            if (captured.notionalCcy && [...dstNotional.options].some(o => o.value === captured.notionalCcy)) {
                dstNotional.value = captured.notionalCcy;
            }

            // Plain inputs
            dst.querySelector(`#notionalAmount${newIndex}`).value = captured.amount || '';
            dst.querySelector(`#spread${newIndex}`).value = captured.spread || '';
            dst.querySelector(`#spreadUnit${newIndex}`).value = captured.spreadUnit || 'bps';
            dst.querySelector(`#marketType${newIndex}`).value = captured.tenor || 'Spot';

            if (captured.orderType === 'limit') {
                dst.querySelector(`#limitPrice${newIndex}`).value = captured.limitPrice || '';
                if (captured.goodTill) dst.querySelector(`#goodTill${newIndex}`).value = captured.goodTill;
            }
        }

        async function fetchPriceData(pair, index, chartType) {
            const canvas = document.getElementById(`${chartType}${index}`);
            const errEl = document.getElementById(`chartError${index}`);
            if (errEl) errEl.style.display = 'none';
            if (canvas) canvas.style.display = '';

            try {
                const response = await fetch(`/api/price/${pair}`);
                if (!response.ok) {
                    const body = await response.json().catch(() => ({ error: `HTTP ${response.status}` }));
                    throw new Error(body.error || `HTTP ${response.status}`);
                }
                const data = await response.json();
                if (!data || data.length === 0) throw new Error('No data returned');
                const labels = data.map(d => d.date);
                const prices = data.map(d => d.close);
                if (canvas.chart) canvas.chart.destroy();
                canvas.chart = new Chart(canvas.getContext('2d'), {
                    type: 'line',
                    data: { labels, datasets: [{ label: `${pair}`, data: prices, borderColor: '#2962FF', tension: 0.4 }] },
                    options: { responsive: true, scales: { x: { display: true }, y: { ticks: { callback: v => v.toFixed(4) } } } }
                });
            } catch (error) {
                console.error(`[Order ${index}] chart fetch failed:`, error);
                if (canvas) canvas.style.display = 'none';
                if (errEl) {
                    errEl.style.display = 'block';
                    errEl.textContent = `Chart unavailable for ${pair}: ${error.message}. (Yahoo Finance often rate-limits — try again in a minute.)`;
                }
            }
        }

        addOrder();
        document.getElementById('addOrder').addEventListener('click', addOrder);

        // Mount the FX account picker; auto-resolve routing on select.
        fxPicker = PoseidonAccountPicker.mountAccountPicker(
            document.getElementById('fxAccountPicker'),
            async (account) => {
                const cp = await PoseidonCounterparty.getCounterparty(account, 'fx');
                updateFxRoutingDisplay(account, cp);
            }
        );

        document.getElementById('openOutlook').addEventListener('click', async () => {
            const account = fxPicker.getSelected();
            if (!account) { alert('Please select an account.'); return; }
            const cp = await PoseidonCounterparty.getCounterparty(account, 'fx');
            if (!cp || !cp.to || cp.to.length === 0) {
                alert(`No FX counterparty configured for ${account.custodian}/${account.book}.`);
                return;
            }

            const orders = document.querySelectorAll('#orders .order');
            let marketCounter = 0, limitCounter = 0;
            let orderTexts = [];

            for (let idx = 0; idx < orders.length; idx++) {
                const order = orders[idx];
                const i = idx + 1;
                const buy = order.querySelector(`#buyCurrency${i}`)?.value || '';
                const sell = order.querySelector(`#sellCurrency${i}`)?.value || '';
                if (buy && sell && buy === sell) {
                    alert(`Order ${i}: Buy and Sell cannot be the same currency.`);
                    return;
                }
            }

            orders.forEach((order, index) => {
                const currentIndex = index + 1;
                try {
                    const orderType = order.querySelector(`input[name="orderType${currentIndex}"]:checked`)?.value || 'market';
                    const buyCurrency = order.querySelector(`#buyCurrency${currentIndex}`)?.value || 'N/A';
                    const sellCurrency = order.querySelector(`#sellCurrency${currentIndex}`)?.value || 'N/A';
                    const notionalAmount = order.querySelector(`#notionalAmount${currentIndex}`)?.value.replace(/,/g, '') || '0';
                    const notionalCurrency = order.querySelector(`#notionalCurrency${currentIndex}`)?.value || 'USD';
                    const tenor = order.querySelector(`#marketType${currentIndex}`)?.value || 'Spot';
                    const spread = order.querySelector(`#spread${currentIndex}`)?.value || 'N/A';
                    const spreadUnit = order.querySelector(`#spreadUnit${currentIndex}`)?.value || 'bps';
                    const pair = `${buyCurrency}${sellCurrency}`;

                    let orderText = '';
                    if (orderType === 'market') {
                        marketCounter++;
                        orderText = `**FX Market Order ${marketCounter}**\nBuy ${buyCurrency}\nSell ${sellCurrency}\nNotional ${notionalCurrency} ${formatNotional(notionalAmount)}\nAt Market, Tenor ${tenor}\nSpread: ${spread}${spreadUnit}`;
                    } else {
                        limitCounter++;
                        const limitPrice = order.querySelector(`#limitPrice${currentIndex}`)?.value || 'N/A';
                        const goodTill = order.querySelector(`#goodTill${currentIndex}`)?.value || 'N/A';
                        orderText = `**FX Limit Order ${limitCounter}**\nBuy ${buyCurrency}\nSell ${sellCurrency}\nNotional ${notionalCurrency} ${formatNotional(notionalAmount)}\nAt Limit ${pair} = ${limitPrice}, Tenor ${tenor}\nGood til ${goodTill}\nSpread: ${spread}${spreadUnit}`;
                    }
                    orderTexts.push(orderText);
                } catch (error) {
                    console.error(`Error processing order ${currentIndex}:`, error);
                    orderTexts.push(`**Invalid Order ${currentIndex}**`);
                }
            });

            const salutation = PoseidonCounterparty.counterpartySalutation(cp);
            let acTagLine = `For a/c ${account.accountNo} ${account.acName}`;
            if (cp.clientCode) acTagLine += ` [Client Code: ${cp.clientCode}]`;
            const emailBody = `Hi ${salutation},\n\n${acTagLine},\n\nPls help us place below orders. Thanks.\n\n${orderTexts.join('\n\n')}\n`;

            const subject = `FX Orders - ${formatDateForSubject()}`;
            PoseidonCommon.openMailto(cp.to, buildCcList(cp, account), subject, emailBody);
        });

        // ===== Call Deposit tab =====
        (function initCallDeposit() {
            const ALL_CCY = ['USD','EUR','JPY','GBP','CAD','AUD','NZD','CHF','HKD','CNH','KRW','TWD','SGD'];
            const PRECHECK_THRESHOLD_USD = 50000;

            const ccySelect = document.getElementById('cdCcy');
            ALL_CCY.forEach(c => ccySelect.add(new Option(c, c)));
            ccySelect.value = 'USD';

            const amountInput = document.getElementById('cdAmount');
            amountInput.addEventListener('input', () => { amountInput.value = PoseidonCommon.formatNotional(amountInput.value); });

            const valueDateInput = document.getElementById('cdValueDate');
            const today = new Date();
            flatpickr(valueDateInput, { defaultDate: today, dateFormat: 'd M Y' });
            valueDateInput.value = flatpickr.formatDate(today, 'd M Y');

            const generateBtn = document.getElementById('cdGenerate');
            const picker = PoseidonAccountPicker.mountAccountPicker(
                document.getElementById('cdAccountPicker'),
                () => { generateBtn.disabled = false; }
            );

            async function buildAndSend() {
                const account = picker.getSelected();
                if (!account) return;
                const sub = picker.getSubAccount();
                const ccy = ccySelect.value;
                const rawAmount = amountInput.value.trim();
                if (!rawAmount || PoseidonCommon.parseNotional(rawAmount) <= 0) {
                    alert('Please enter a valid amount.');
                    return;
                }

                const action = document.querySelector('input[name="cdAction"]:checked').value;
                const cp = await PoseidonCounterparty.getCounterparty(account);
                const salutation = PoseidonCounterparty.counterpartySalutation(cp);

                const valueD = new Date(valueDateInput.value.trim());
                const ctx = {
                    salutation,
                    book: account.book,
                    copy: account.copy || account.accountNo,
                    sub,
                    acName: account.acName,
                    ccy,
                    amount: rawAmount,
                    valueLabel: PoseidonCommon.valueDateLabel(valueD),
                };

                const tpl = action === 'place'
                    ? PoseidonTemplates.callDepositPlace(ctx)
                    : PoseidonTemplates.callDepositUnwind(ctx);

                PoseidonCommon.openMailto(cp.to, buildCcList(cp, account), tpl.subject, tpl.body);
            }

            generateBtn.addEventListener('click', () => {
                const action = document.querySelector('input[name="cdAction"]:checked').value;
                const amountUsd = ccySelect.value === 'USD' ? PoseidonCommon.parseNotional(amountInput.value) : Infinity;
                if (action === 'place' && amountUsd < PRECHECK_THRESHOLD_USD) {
                    PoseidonCommon.showWarningModal({
                        title: 'Amount below 50,000 USD',
                        body: `Call Deposit Place is typically reserved for amounts ≥ USD 50,000. Current amount: USD ${amountInput.value}. Continue anyway?`,
                        onContinue: buildAndSend,
                    });
                } else {
                    buildAndSend();
                }
            });
        })();

        // ===== Shared helpers for the loan / FTD tabs =====
        const ALL_CCY_LIST = ['USD','EUR','JPY','GBP','CAD','AUD','NZD','CHF','HKD','CNH','KRW','TWD','SGD'];

        function fillCurrencySelect(select, defaultCcy = 'USD') {
            ALL_CCY_LIST.forEach(c => select.add(new Option(c, c)));
            select.value = defaultCcy;
        }

        function attachAmountFormatter(input) {
            input.addEventListener('input', () => { input.value = PoseidonCommon.formatNotional(input.value); });
        }

        function buildCcList(cp, account) {
            const me = PoseidonCommon.myEmail();
            return [
                ...(cp.ccBackup || []),
                'fa@ppgfo.com',
                ...(account.pcEmail ? [account.pcEmail] : []),
                ...(me ? [me] : []),
            ];
        }

        // ===== FTD Deposit tab =====
        (function initFtdDeposit() {
            const ccySelect = document.getElementById('ftdCcy');
            const amountInput = document.getElementById('ftdAmount');
            const tenorSelect = document.getElementById('ftdTenor');
            const rateInput = document.getElementById('ftdRate');
            const valueDateInput = document.getElementById('ftdValueDate');
            const generateBtn = document.getElementById('ftdGenerate');

            const TENORS = [
                '1 week', '2 week',
                '1 month', '2 month', '3 month', '4 month', '5 month', '6 month',
                '7 month', '8 month', '9 month', '10 month', '11 month', '12 month',
                '18 month', '2y', '3y',
            ];
            TENORS.forEach(t => tenorSelect.add(new Option(t, t)));
            tenorSelect.value = '1 month';

            fillCurrencySelect(ccySelect);
            attachAmountFormatter(amountInput);

            const today = new Date();
            flatpickr(valueDateInput, { defaultDate: today, dateFormat: 'd M Y' });
            valueDateInput.value = flatpickr.formatDate(today, 'd M Y');

            const picker = PoseidonAccountPicker.mountAccountPicker(
                document.getElementById('ftdAccountPicker'),
                () => { generateBtn.disabled = false; }
            );

            generateBtn.addEventListener('click', async () => {
                const account = picker.getSelected();
                if (!account) return;
                const sub = picker.getSubAccount();
                const ccy = ccySelect.value;
                const rawAmount = amountInput.value.trim();
                const tenor = tenorSelect.value;
                if (!rawAmount || PoseidonCommon.parseNotional(rawAmount) <= 0) { alert('Please enter a valid amount.'); return; }
                if (!tenor) { alert('Please pick a tenor.'); return; }

                const cp = await PoseidonCounterparty.getCounterparty(account);
                // UBS CH accounts are booked at UBS Jersey
                const bookingEntity = (account.custodian === 'UBS' && account.book === 'CH') ? 'UBS Jersey' : '';
                const valueD = new Date(valueDateInput.value.trim());
                const tpl = PoseidonTemplates.ftdDeposit({
                    salutation: PoseidonCounterparty.counterpartySalutation(cp),
                    book: account.book,
                    copy: account.copy || account.accountNo,
                    sub,
                    acName: account.acName,
                    ccy,
                    amount: rawAmount,
                    tenor,
                    rate: rateInput.value.trim(),
                    bookingEntity,
                    valueLabel: PoseidonCommon.valueDateLabel(valueD),
                });
                PoseidonCommon.openMailto(cp.to, buildCcList(cp, account), tpl.subject, tpl.body);
            });
        })();

        // ===== One-off Loan tab =====
        (function initOneOffLoan() {
            const ccySelect = document.getElementById('oolCcy');
            const amountInput = document.getElementById('oolAmount');
            const startDateInput = document.getElementById('oolStartDate');
            const endDateInput = document.getElementById('oolEndDate');
            const purposeInput = document.getElementById('oolPurpose');
            const generateBtn = document.getElementById('oolGenerate');

            fillCurrencySelect(ccySelect);
            attachAmountFormatter(amountInput);

            const today = new Date();
            flatpickr(startDateInput, { defaultDate: today, dateFormat: 'j M Y' });
            startDateInput.value = flatpickr.formatDate(today, 'j M Y');

            const defaultEnd = new Date(today.getTime() + 7 * 86400000);
            flatpickr(endDateInput, {
                defaultDate: defaultEnd,
                dateFormat: 'j M Y',
                position: 'auto right',
                appendTo: document.body,
            });
            endDateInput.value = flatpickr.formatDate(defaultEnd, 'j M Y');

            const picker = PoseidonAccountPicker.mountAccountPicker(
                document.getElementById('oolAccountPicker'),
                () => { generateBtn.disabled = false; }
            );

            generateBtn.addEventListener('click', async () => {
                const account = picker.getSelected();
                if (!account) return;
                const sub = picker.getSubAccount();
                const ccy = ccySelect.value;
                const rawAmount = amountInput.value.trim();
                if (!rawAmount || PoseidonCommon.parseNotional(rawAmount) <= 0) { alert('Please enter a valid amount.'); return; }

                const startStr = startDateInput.value.trim();
                const endStr = endDateInput.value.trim();
                if (!endStr) { alert('Please select an end date.'); return; }
                const startD = new Date(startStr), endD = new Date(endStr);
                if (endD <= startD) { alert('End date must be after start date.'); return; }

                const cp = await PoseidonCounterparty.getCounterparty(account);
                const tpl = PoseidonTemplates.oneOffLoan({
                    salutation: PoseidonCounterparty.counterpartySalutation(cp),
                    copy: account.copy || account.accountNo,
                    sub,
                    acName: account.acName,
                    ccy,
                    amount: rawAmount,
                    purpose: purposeInput.value.trim() || 'to cover OD',
                    endDate: endStr,
                    startLabel: PoseidonCommon.startDateLabel(startD),
                });
                PoseidonCommon.openMailto(cp.to, buildCcList(cp, account), tpl.subject, tpl.body);
            });
        })();

        // ===== SI Loan tab =====
        (function initSiLoan() {
            const SI_DEFAULT_LOAN_INSTRUCTION = 'P+I+-Balance';

            const ccySelect = document.getElementById('siCcy');
            const amountInput = document.getElementById('siAmount');
            const startDateInput = document.getElementById('siStartDate');
            const rollingSelect = document.getElementById('siRolling');
            const loanInstrInput = document.getElementById('siLoanInstruction');
            const purposeInput = document.getElementById('siPurpose');
            const generateBtn = document.getElementById('siGenerate');

            fillCurrencySelect(ccySelect);
            attachAmountFormatter(amountInput);
            loanInstrInput.value = SI_DEFAULT_LOAN_INSTRUCTION;

            const today = new Date();
            flatpickr(startDateInput, { defaultDate: today, dateFormat: 'j F Y' });
            startDateInput.value = flatpickr.formatDate(today, 'j F Y');

            const picker = PoseidonAccountPicker.mountAccountPicker(
                document.getElementById('siAccountPicker'),
                (account) => {
                    generateBtn.disabled = false;
                    // SI Loan body always needs an instruction; prefer account's value, else default
                    loanInstrInput.value = account.loanInstruction || SI_DEFAULT_LOAN_INSTRUCTION;
                }
            );

            generateBtn.addEventListener('click', async () => {
                const account = picker.getSelected();
                if (!account) return;
                const sub = picker.getSubAccount();
                const ccy = ccySelect.value;
                const rawAmount = amountInput.value.trim();
                if (!rawAmount || PoseidonCommon.parseNotional(rawAmount) <= 0) { alert('Please enter a valid amount.'); return; }

                const cp = await PoseidonCounterparty.getCounterparty(account);
                const startD = new Date(startDateInput.value.trim());
                const tpl = PoseidonTemplates.siLoan({
                    salutation: PoseidonCounterparty.counterpartySalutation(cp),
                    copy: account.copy || account.accountNo,
                    sub,
                    acName: account.acName,
                    ccy,
                    amount: rawAmount,
                    rolling: rollingSelect.value,
                    loanInstruction: loanInstrInput.value.trim() || SI_DEFAULT_LOAN_INSTRUCTION,
                    purpose: purposeInput.value.trim() || 'to cover OD',
                    startLabel: PoseidonCommon.startDateLabel(startD),
                });
                PoseidonCommon.openMailto(cp.to, buildCcList(cp, account), tpl.subject, tpl.body);
            });
        })();
    </script>
</body>
